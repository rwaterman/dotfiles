# Standalone tmux config. No plugin manager, no external scripts — one file.
# Gruvbox dark palette is inlined below as plain status styling.

# --- General -----------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"          # true colour
set -g history-limit 100000
set -g escape-time 10                        # no ESC lag in vim
set -g focus-events on
set -g base-index 1                          # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on                   # keep window numbers gapless
set -g mouse on
set -g status-position top
set -g mode-keys vi
set -g status-keys vi
set -g set-clipboard on

# --- Key bindings ------------------------------------------------------------
# prefix is C-a; unbind tmux's default C-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"
bind m set -g mouse \; display "mouse #{?mouse,on,off}"

# new windows and splits keep the current path; ditch the default " and %
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# vi-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vi-style copy mode, yank to the macOS clipboard
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-no-clear "pbcopy"

# --- Gruvbox dark theme ------------------------------------------------------
# bg0 #1d2021  bg1 #3c3836  bg2 #504945  fg #ebdbb2  gray #a89984
# yellow #fabd2f  aqua #8ec07c  blue #83a598  green #b8bb26  red #fb4934
set -g status-style "bg=#3c3836,fg=#a89984"
set -g status-left "#[fg=#1d2021,bg=#8ec07c,bold] #S #[default] "
set -g status-left-length 30
set -g status-right "#[fg=#83a598]#H #[fg=#a89984]%Y-%m-%d %H:%M "
set -g status-right-length 60

setw -g window-status-format         " #I:#W#{?window_zoomed_flag, Z,} "
setw -g window-status-current-format "#[fg=#1d2021,bg=#fabd2f,bold] #I:#W#{?window_zoomed_flag, Z,} "
setw -g window-status-separator ""

set -g pane-border-style        "fg=#504945"
set -g pane-active-border-style "fg=#8ec07c"
set -g message-style         "bg=#fabd2f,fg=#1d2021,bold"
set -g message-command-style "bg=#1d2021,fg=#fabd2f"
set -g mode-style            "bg=#83a598,fg=#1d2021"
setw -g clock-mode-colour    "#8ec07c"
